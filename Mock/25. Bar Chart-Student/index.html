<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simple Student Bar Chart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Students by Department</h1>

    <div class="chart-box">
      <div class="bar-item">
        <div class="bar red" style="height: 300px;">120</div>
        <p class="label">CSE</p>
      </div>

      <div class="bar-item">
        <div class="bar blue" style="height: 240px;">95</div>
        <p class="label">ECE</p>
      </div>

      <div class="bar-item">
        <div class="bar green" style="height: 200px;">80</div>
        <p class="label">ME</p>
      </div>

      <div class="bar-item">
        <div class="bar pink" style="height: 175px;">70</div>
        <p class="label">CE</p>
      </div>

      <div class="bar-item">
        <div class="bar yellow" style="height: 150px;">60</div>
        <p class="label">EEE</p>
      </div>
    </div>

    <div class="legend">
      <p>Data values: CSE 120, ECE 95, ME 80, CE 70, EEE 60</p>
    </div>
  </div>
</body>
</html>
