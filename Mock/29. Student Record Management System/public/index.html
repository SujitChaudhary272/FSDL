<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Record Management</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card">
    <h1>Student Record Management</h1>

    <form id="addForm" class="form-vertical">
      <input name="name" placeholder="Name" required />
      <input name="rollNo" placeholder="Roll No" required />
      <input name="branch" placeholder="Branch" required />
      <button type="submit">Save</button>
    </form>

    <button type="button" id="retrieveBtn">Retrieve Student Details</button>

    <p id="msg"></p>

    <table id="resultTable" class="hidden">
      <thead>
        <tr><th>Name</th><th>Roll No</th><th>Branch</th><th>Action</th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </main>

  <script src="script.js"></script>
</body>
</html>
