<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simple Product Filter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Product Filtering System</h1>
    <div class="button-area">
      <button class="btn active" data-filter="All">All</button>
      <button class="btn" data-filter="Electronics">Electronics</button>
      <button class="btn" data-filter="Fashion">Fashion</button>
      <button class="btn" data-filter="Home">Home</button>
      <button class="btn" data-filter="Food">Food</button>
    </div>

    <div class="card-area">
      <div class="card" data-category="Electronics">
        <img class="product-image" src="images/espresso-machine.jpg" alt="Espresso Machine" />
        <h3>Espresso Machine</h3>
        <p>$299</p>
      </div>

      <div class="card" data-category="Electronics">
        <img class="product-image" src="images/wireless-mouse.jpg" alt="Wireless Mouse" />
        <h3>Wireless Mouse</h3>
        <p>$25</p>
      </div>

      <div class="card" data-category="Fashion">
        <img class="product-image" src="images/denim-jacket.jpg" alt="Denim Jacket" />
        <h3>Denim Jacket</h3>
        <p>$60</p>
      </div>

      <div class="card" data-category="Fashion">
        <img class="product-image" src="images/running-shoes.jpg" alt="Running Shoes" />
        <h3>Running Shoes</h3>
        <p>$90</p>
      </div>

      <div class="card" data-category="Home">
        <img class="product-image" src="images/desk-lamp.jpg" alt="Desk Lamp" />
        <h3>Desk Lamp</h3>
        <p>$32</p>
      </div>

      <div class="card" data-category="Home">
        <img class="product-image" src="images/cushion-set.jpg" alt="Cushion Set" />
        <h3>Cushion Set</h3>
        <p>$20</p>
      </div>

      <div class="card" data-category="Food">
        <img class="product-image" src="images/protein-bar-pack.jpg" alt="Protein Bar Pack" />
        <h3>Protein Bar Pack</h3>
        <p>$12</p>
      </div>

      <div class="card" data-category="Food">
        <img class="product-image" src="images/organic-tea.jpg" alt="Organic Tea" />
        <h3>Organic Tea</h3>
        <p>$8</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
