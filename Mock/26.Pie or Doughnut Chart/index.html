<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Pie Chart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Attendance Report</h1>
        <p class="sub-title">Attendance pie chart</p>

        <div class="chart-box">
            <div class="pie-chart"></div>

            <ul class="details">
                <li><span class="color present"></span> Present - 70%</li>
                <li><span class="color absent"></span> Absent - 20%</li>
                <li><span class="color leave"></span> Leave - 10%</li>
            </ul>
        </div>
    </div>
</body>
</html>
